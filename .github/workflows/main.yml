name: CI

env:
  BUILD_TYPE: Debug Release

permissions:
  contents: 'read'
  pages: 'write'
  id-token: 'write'

on: [push, pull_request, workflow_dispatch]

jobs:
  ubuntu:
    name: ubuntu-${{ matrix.compiler }}-${{ matrix.config }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]
        compiler: [clang++, g++]
        include:
          # - os: ubuntu-latest
          #   compiler: g++-12
          - os: ubuntu-latest
            compiler: clang++-18
            pre_configure: dev/ci-pre-configure-clang 18
          - os: macos-latest
            compiler: c++
          - os: windows-latest
            compiler: cl
            cmake_generator: -G "NMake Makefiles"
    steps:
      - uses: actions/checkout@v4
      - name: Install compiler
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh $1
        if: matrix.compiler == 'clang++'
      - name: Configure
        run: |
          cmake -S . -B __build__  -DCMAKE_CXX_COMPILER=${{ matrix.compiler }} -DCMAKE_BUILD_TYPE=${{ matrix.config }}
      - name: Build
        run: |
          cmake --build __build__ --target all -j 16
      - name: Test
        run: |
          cd __build__
          ctest
  macos:
    name: macos-${{ matrix.config }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: |
          cmake -S . -B __build__  -DCMAKE_BUILD_TYPE=${{ matrix.config }}
      - name: Build
        run: |
          cmake --build __build__ --target all -j 16
      - name: Test
        run: |
          cd __build__
          ctest
  windows:
    name: windows-${{ matrix.config }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]
    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1.4.1
        if: matrix.os == 'windows-latest'
      - name: Configure
        run: |
          ${{ matrix.pre_configure }}
          cmake -S . -B __build__ -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=${{ matrix.config }}
      - name: Build
        run: |
          cmake --build __build__ --target all -j 16
      - name: Test
        run: |
          cd __build__
          ctest
  artifacts:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Install asciidoctor
        run: |
          sudo apt-get install asciidoctor
          asciidoctor doc/openmethod.adoc -o build_outputs_folder/index.html
      - name: Generate documentation
        run: |
          sudo apt-get install asciidoctor
          asciidoctor doc/openmethod.adoc -o build_outputs_folder/index.html
      - name: Build flat headers
        run: |
          mkdir -p build_outputs_folder/boost/openmethod
          python3 dev/flatten.py \
            build_outputs_folder/boost/openmethod.hpp \
            include/boost/openmethod.hpp \
            include/boost/openmethod/unique_ptr.hpp \
            include/boost/openmethod/shared_ptr.hpp \
            include/boost/openmethod/compiler.hpp
          python3 dev/flatten.py \
            build_outputs_folder/boost/openmethod/policies.hpp \
            include/boost/openmethod/policies.hpp
      - name: Upload static files as artifact
        uses: actions/upload-pages-artifact@v3 # or specific "vX.X.X" version tag for this action
        with:
          path: build_outputs_folder/
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
